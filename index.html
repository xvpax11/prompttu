<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Animal Spotter - พิกัดน้องๆ ใน มธ.</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #f4f7f6; }
        #map { width: 100vw; height: 100vh; cursor: crosshair; }
        
        /* 🎨 ปรับโทนสีแผนที่ให้เย็นขึ้นนิดนึง (อมน้ำเงินม่วงเบาๆ) */
        .leaflet-tile-pane { filter: saturate(1.1) contrast(1.05) hue-rotate(-5deg); }

        /* 🌌 กล่องข้อมูล: ธีมสีน้ำเงิน-ม่วง (Blue-Purple) */
        .info-box {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: linear-gradient(135deg, #4A00E0 0%, #8E2DE2 100%); color: white; 
            padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(74, 0, 224, 0.4); border: 2px solid #00D4FF; width: 220px;
        }
        /* ตัดด้วยสีฟ้า Cyan ให้ดูอวกาศ/ล้ำสมัย */
        .info-box h3 { margin: 0 0 5px 0; font-size: 1.25em; text-align: center; color: #00D4FF; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .instruction { font-size: 0.85em; text-align: center; margin-bottom: 10px; color: #E0B0FF; font-weight: bold; }
        
        /* ปุ่ม Login เรียบหรู แต่ตัวหนังสือสีน้ำเงินม่วง */
        .btn-google { background: #ffffff; color: #4A00E0; border: none; padding: 10px 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Kanit', sans-serif; box-shadow: 0 2px 5px rgba(0,0,0,0.2); transition: 0.2s; }
        .btn-google:hover { background: #F3E5F5; transform: scale(1.02); }

        .animal-icon { font-size: 26px; text-align: center; line-height: 26px; drop-shadow: 0 2px 4px rgba(74,0,224,0.5); }

        /* 🌌 Modal: โทนสีน้ำเงินม่วงเข้ม */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,0,40,0.7); z-index: 1999; backdrop-filter: blur(2px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: linear-gradient(135deg, #4A00E0 0%, #8E2DE2 100%); color: white; 
            padding: 25px; border-radius: 16px; z-index: 2000; width: 85%; max-width: 320px; 
            box-shadow: 0 10px 25px rgba(74, 0, 224, 0.5); border: 2px solid #00D4FF; }
        .modal.active, .modal-overlay.active { display: block; }
        .modal h4 { margin-top: 0; margin-bottom: 20px; text-align: center; color: #00D4FF; font-size: 1.3em; }
        .modal label { color: #E0B0FF; font-weight: bold; font-size: 0.9em; display: block; margin-top: 10px; }
        
        /* ช่องกรอกข้อมูล คลีนๆ อ่านง่าย ขอบม่วง */
        .modal select, .modal input[type="text"], .modal input[type="number"] { 
            width: 100%; box-sizing: border-box; padding: 10px; margin: 5px 0 10px 0; 
            border: 2px solid #B388FF; border-radius: 8px; background: #FFFFFF; 
            font-family: 'Kanit', sans-serif; color: #4A00E0; font-size: 0.95em; font-weight: bold;
        }
        .modal select:focus, .modal input[type="text"]:focus, .modal input[type="number"]:focus { 
            border-color: #00D4FF; outline: none; box-shadow: 0 0 8px rgba(0, 212, 255, 0.4); 
        }
        .modal input[type="file"] { margin: 5px 0 20px 0; width: 100%; font-size: 0.9em; color: #E0B0FF; }
        
        .btn-group { display: flex; justify-content: space-between; gap: 10px; }
        .btn { padding: 10px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-family: 'Kanit', sans-serif; font-size: 1em; }
        /* ปุ่ม Save สีฟ้า Cyan เด่นๆ ตัดกับพื้นหลังม่วง */
        .btn-save { background: #00D4FF; color: #4A00E0; }
        .btn-save:hover { background: #00E5FF; transform: scale(1.02); box-shadow: 0 0 10px rgba(0,212,255,0.5); }
        .btn-cancel { background: #EDE7F6; color: #4A00E0; }
        .btn-cancel:hover { background: #D1C4E9; }
        .btn:disabled { background: #ccc; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .popup-img { width: 100%; max-height: 150px; object-fit: cover; border-radius: 8px; margin-top: 8px; border: 2px solid #B388FF; }
        .btn-delete { background: #FF4081; color: white; border: none; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 0.85em; margin-top: 10px; width: 100%; font-family: 'Kanit', sans-serif; font-weight: bold; }
        .btn-delete:hover { background: #F50057; }

        /* 📍 ปุ่ม Location สีน้ำเงินม่วง ขอบฟ้า */
        .btn-location { 
            position: absolute; bottom: 25px; right: 15px; z-index: 1000; 
            background: linear-gradient(135deg, #4A00E0 0%, #8E2DE2 100%); 
            color: white; padding: 12px 18px; border: 2px solid #00D4FF; border-radius: 30px; 
            box-shadow: 0 4px 10px rgba(74, 0, 224, 0.4); cursor: pointer; 
            font-family: 'Kanit', sans-serif; font-weight: bold; font-size: 1em; 
            transition: 0.3s; display: flex; align-items: center; gap: 8px;
        }
        .btn-location:hover { transform: scale(1.05); border-color: #FFFFFF; box-shadow: 0 4px 15px rgba(0, 212, 255, 0.5); }

        @media only screen and (max-width: 600px) {
            .info-box { width: 180px; padding: 10px 15px; top: 10px; right: 10px; }
            .info-box h3 { font-size: 1.1em; }
            .instruction { font-size: 0.8em; }
            .modal { width: 90%; max-width: 300px; padding: 20px; }
            .modal h4 { font-size: 1.2em; }
            .modal select, .modal input[type="text"], .modal input[type="number"] { padding: 8px; font-size: 0.9em; }
            .btn-location { padding: 10px 15px; font-size: 0.9em; bottom: 20px; right: 10px; }
        }
    </style>
</head>
<body>

    <div class="info-box">
        <h3>🐾 TU Animal Spotter</h3>
        <p class="instruction">👇 แตะที่แผนที่เพื่อปักหมุด!</p>
        <hr style="border-color: #00D4FF; margin: 15px 0;">
        
        <div id="auth-section">
            <button id="loginBtn" class="btn-google">🔑 ล็อกอินด้วย Google</button>
            <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                <img id="userPic" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #00D4FF;">
                <div>
                    <div id="userName" style="font-size: 0.9em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; color: #00D4FF;"></div>
                    <button id="logoutBtn" style="background: transparent; border: none; color: #E0B0FF; cursor: pointer; padding: 0; font-size: 0.8em; text-decoration: underline; font-family: 'Kanit', sans-serif;">ออกจากระบบ</button>
                </div>
            </div>
        </div>
    </div>

    <button class="btn-location" onclick="locateUser()">📍 ตำแหน่งของฉัน</button>
    <div id="map"></div>

    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal" id="inputModal">
        <h4>ข้อมูลการเจอ</h4>

        <label>ชนิดของสัตว์:</label>
        <select id="animalType">
            <option value="dog">สุนัข 🐶</option>
            <option value="cat">แมว 🐱</option>
            <option value="monitor_lizard">ตัวเงินตัวทอง 🦎</option>
        </select>
        
        <label>ชื่อ/ลักษณะ (เลือกจากรายชื่อ หรือพิมพ์เพิ่ม):</label>
        <select id="dogName">
            <option value="ไม่ทราบชื่อ / ตัวใหม่">-- ไม่ทราบชื่อ / ตัวใหม่ --</option>
            <option value="เจ้าดำ ตึก SC">เจ้าดำ ตึก SC</option>
            <option value="น้อนด่าง อินเตอร์โซน">น้อนด่าง อินเตอร์โซน</option>
            <option value="หมาส้ม โรงอาหาร">หมาส้ม โรงอาหาร</option>
            <option value="เจ้าขาว หอสมุด">เจ้าขาว หอสมุด</option>
            <option value="แมวส้ม สถาปัตย์">แมวส้ม สถาปัตย์</option>
            <option value="แมวจร หน้าหอ">แมวจร หน้าหอ</option>
            <option value="ตะกวด ริมน้ำ บร.">ตะกวด ริมน้ำ บร.</option>
        </select>
        <label>ลักษณะเพิ่มเติม/รายละเอียดสถานที่:</label>
        <input type="text" id="dogDesc" placeholder="เช่น ใส่ปลอกคอ, นอนอยู่ใต้พุ่มไม้">
        <label>จำนวน (ตัว):</label>
        <input type="number" id="dogCount" value="1" min="1">
        <label>รูปถ่าย (ถ้ามี):</label>
        <input type="file" id="dogImage" accept="image/*">
        <div class="btn-group">
            <button class="btn btn-cancel" id="cancelBtn">ยกเลิก</button>
            <button class="btn btn-save" id="saveBtn">บันทึกพิกัด</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        // 🛑 🌟 ใส่ Config ของ Firebase ตรงนี้ 🌟 🛑
        const firebaseConfig = {
  apiKey: "AIzaSyCAdPb47V586FtJ1Mde-v3nhy4QN3Qj1i0",
  authDomain: "tu-dog-spotter.firebaseapp.com",
  databaseURL: "https://tu-dog-spotter-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tu-dog-spotter",
  storageBucket: "tu-dog-spotter.firebasestorage.app",
  messagingSenderId: "857595973549",
  appId: "1:857595973549:web:206633a42f2d487086db24"
        };

        // 🛑 🌟 ใส่ API Key ของ ImgBB ตรงนี้ 🌟 🛑
        const IMGBB_API_KEY = "6a5787ed71b7da00961d04d9a7a6ab21"; 

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;
        let globalAnimalsData = null;

        function getAnimalIcon(type) {
            let iconHtml = '🐶'; 
            if (type === 'cat') iconHtml = '🐱';
            else if (type === 'monitor_lizard') iconHtml = '🦎';
            
            return L.divIcon({ 
                html: iconHtml, 
                className: 'animal-icon',
                iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -10] 
            });
        }

        const animalNamesTh = {
            'dog': 'น้องหมา',
            'cat': 'น้องแมว',
            'monitor_lizard': 'ตัวเงินตัวทอง/ตะกวด'
        };

        function renderMapMarkers() {
            dogMarkersLayer.clearLayers(); 
            if (!globalAnimalsData) return;

            for (let key in globalAnimalsData) {
                const data = globalAnimalsData[key];
                const lat = data.lat; const lng = data.lng;
                const type = data.animalType || 'dog'; 
                const name = data.name || 'ไม่ทราบชื่อ'; const desc = data.description || '-';
                const count = data.count || 1; const imageUrl = data.imageUrl || '';
                const spotter = data.spotterName || 'ผู้ใช้ไม่ระบุตัวตน';
                const spotterUid = data.spotterUid || 'unknown_uid';
                const timeString = new Date(data.timestamp).toLocaleTimeString('th-TH');
                const imageHtml = imageUrl ? `<img src="${imageUrl}" class="popup-img">` : '';

                let deleteBtnHtml = '';
                if (currentUser && currentUser.uid === spotterUid) {
                    deleteBtnHtml = `<button class="btn-delete" onclick="deleteAnimalMarker('${key}', '${spotterUid}')">🗑️ ลบพิกัดนี้</button>`;
                }

                const dynamicIcon = getAnimalIcon(type);
                const friendlyTypeName = animalNamesTh[type];

                const marker = L.marker([lat, lng], {icon: dynamicIcon})
                    .bindPopup(`
                        <b style="font-size:1.1em; color:#4A00E0;">${friendlyTypeName} ${count} ตัว 🐾</b><br>
                        <b style="color:#8E2DE2;">ชื่อ/ลักษณะ:</b> ${name}<br>
                        <b style="color:#8E2DE2;">ลักษณะเพิ่มเติม:</b> ${desc}<br>
                        ${imageHtml}
                        <div style="color:gray; font-size:0.8em; margin-top:5px;">เจอโดย: <b style="color:#4A00E0;">${spotter}</b><br>อัปเดตเมื่อ: ${timeString}</div>
                        ${deleteBtnHtml}
                    `);
                dogMarkersLayer.addLayer(marker);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user; 
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userPic').src = user.photoURL; 
                document.getElementById('userName').innerText = user.displayName; 
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
            renderMapMarkers();
        });

        document.getElementById('loginBtn').onclick = () => {
            signInWithPopup(auth, provider).catch((error) => {
                console.error("ล็อกอินไม่สำเร็จ:", error);
            });
        };
        document.getElementById('logoutBtn').onclick = () => { signOut(auth); };

        const map = L.map('map').setView([14.0686, 100.6067], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '© OpenStreetMap contributors & © CARTO' }).addTo(map);

        const dogMarkersLayer = L.layerGroup().addTo(map);

        let userMarker = null;
        window.locateUser = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    map.setView([position.coords.latitude, position.coords.longitude], 17);
                    if (userMarker) userMarker.setLatLng([position.coords.latitude, position.coords.longitude]);
                    else userMarker = L.circleMarker([position.coords.latitude, position.coords.longitude], { radius: 9, fillColor: "#4A00E0", color: "#00D4FF", weight: 2, opacity: 1, fillOpacity: 0.9 }).addTo(map).bindPopup("📍 คุณอยู่ที่นี่").openPopup();
                }, function() { alert("กรุณากดอนุญาตให้ GPS ของคุณก่อนนะครับ"); });
            }
        };

        window.deleteAnimalMarker = function(markerKey, ownerUid) {
            if (!currentUser) return alert("กรุณาล็อกอินก่อนลบพิกัดนะครับ! 🔑");
            if (currentUser.uid !== ownerUid) return alert("❌ คุณสามารถลบได้เฉพาะพิกัดที่คุณเป็นคนปักเท่านั้นครับ!");
            
            if(confirm("แน่ใจหรือไม่ว่าต้องการลบพิกัดนี้?")) {
                const markerRef = ref(db, 'tu_animals/' + markerKey);
                remove(markerRef).catch((error) => console.error(error));
            }
        };

        const animalsRef = ref(db, 'tu_animals'); 
        onValue(animalsRef, (snapshot) => {
            globalAnimalsData = snapshot.val();
            renderMapMarkers(); 
        });

        let tempLatLng = null;
        const modal = document.getElementById('inputModal');
        const overlay = document.getElementById('modalOverlay');

        map.on('click', function(e) {
            if (!currentUser) return alert("กรุณาล็อกอินด้วย Google ก่อนปักหมุดนะครับ 🐶🔑");
            tempLatLng = e.latlng;
            modal.classList.add('active'); overlay.classList.add('active');
        });

        function closeModal() {
            modal.classList.remove('active'); overlay.classList.remove('active');
            document.getElementById('animalType').selectedIndex = 0; 
            document.getElementById('dogName').selectedIndex = 0;
            document.getElementById('dogDesc').value = ''; 
            document.getElementById('dogCount').value = '1';
            document.getElementById('dogImage').value = ''; 
            saveBtn.innerText = "บันทึกพิกัด"; saveBtn.disabled = false;
        }

        document.getElementById('cancelBtn').onclick = closeModal;

        document.getElementById('saveBtn').onclick = async function() {
            if (!tempLatLng || !currentUser) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "กำลังดำเนินการ..."; saveBtn.disabled = true;

            const selectedAnimalType = document.getElementById('animalType').value; 
            const selectedName = document.getElementById('dogName').value;
            const descInput = document.getElementById('dogDesc').value;
            const countInput = document.getElementById('dogCount').value;
            const file = document.getElementById('dogImage').files[0];
            let downloadUrl = "";

            try {
                if (file) {
                    const formData = new FormData(); formData.append("image", file);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const result = await response.json();
                    if (result.success) downloadUrl = result.data.url;
                }

                await push(animalsRef, {
                    lat: tempLatLng.lat, lng: tempLatLng.lng,
                    animalType: selectedAnimalType, 
                    name: selectedName, 
                    description: descInput || '-', 
                    count: countInput,
                    imageUrl: downloadUrl, 
                    spotterName: currentUser.displayName,
                    spotterUid: currentUser.uid,
                    timestamp: Date.now()
                });
                
                closeModal();
            } catch (error) {
                console.error(error);
                alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะครับ");
                saveBtn.innerText = "บันทึกพิกัด"; saveBtn.disabled = false;
            }
        };

        window.onload = function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.indexOf('Instagram') > -1 || ua.indexOf('Line') > -1) {
                var alertBox = document.createElement('div');
                alertBox.style.position = 'fixed'; alertBox.style.top = '0'; alertBox.style.left = '0'; alertBox.style.width = '100vw'; alertBox.style.height = '100vh'; alertBox.style.backgroundColor = 'rgba(74, 0, 224, 0.95)'; alertBox.style.color = 'white'; alertBox.style.zIndex = '9999'; alertBox.style.display = 'flex'; alertBox.style.flexDirection = 'column'; alertBox.style.justifyContent = 'center'; alertBox.style.alignItems = 'center'; alertBox.style.padding = '20px'; alertBox.style.textAlign = 'center'; alertBox.style.fontFamily = "'Kanit', sans-serif";
                alertBox.innerHTML = `
                    <h2 style="font-size: 2.5em; margin-bottom: 10px; color: #00D4FF; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">🐾 ⚠️</h2>
                    <h3 style="margin-bottom: 20px; color: #FFFFFF;">กรุณาเปิดในเบราว์เซอร์หลัก</h3>
                    <p style="font-size: 1.1em; max-width: 300px; color: #E0B0FF;">เพื่อการใช้งานที่สมบูรณ์แบบและล็อกอินได้<br><br>กรุณากดไอคอน <b>จุด 3 จุด (...)</b> หรือ <b>เข็มทิศ</b> มุมหน้าจอ<br><br>แล้วเลือก <b>"เปิดในเบราว์เซอร์ (Open in Safari / Chrome)"</b></p>
                    <button onclick="this.parentElement.style.display='none'" style="margin-top: 30px; padding: 12px 25px; background: #00D4FF; color: #4A00E0; border: none; border-radius: 12px; font-weight: bold; font-family: 'Kanit', sans-serif; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">เข้าใจแล้ว</button>
                `;
                document.body.appendChild(alertBox);
            }
        };
    </script>
</body>
</html>
