        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -45%); } to { opacity: 1; transform: translate(-50%, -50%); } }

            { icon: "🐱", name: "พี่จอห์นนี่", desc: "เจ้าถิ่นหอสมุดป๋วย ไปเที่ยวอยู่ดาวแมว🤍", img: "https://placehold.co/150x150/11135c/ffde59?text=พี่จอห์นนี่" },
            { icon: "🐱", name: "น้องต้องตา", desc: "เจ้าถิ่นหอสมุดป๋วย", img: "https://placehold.co/150x150/11135c/ffde59?text=ต้องตา" },
            { icon: "🐱", name: "น้องกลอยใจ", desc: "เจ้าถิ่นหอสมุดป๋วย", img: "https://placehold.co/150x150/11135c/ffde59?text=กลอยใจ" },
            { icon: "🐱", name: "น้องเฟรนด์ลี่", desc: "เจ้าถิ่นหอสมุดป๋วย", img: "https://placehold.co/150x150/11135c/ffde59?text=เฟรนด์ลี่" },
            { icon: "🐱", name: "คุณนุ่มนิ่ม", desc: "เจ้าถิ่นหอสมุดป๋วย", img: "https://placehold.co/150x150/11135c/ffde59?text=นุ่มนิ่ม" }
        ];

        window.openRegistry = function() {
            const listDiv = document.getElementById('registryList');
            listDiv.innerHTML = ""; 
            
            animalRegistryData.forEach(animal => {
                listDiv.innerHTML += `
                    <div class="registry-card">
                        <img src="${animal.img}" alt="${animal.name}">
                        <div class="registry-info">
                            <p class="registry-name">${animal.icon} ${animal.name}</p>
                            <p class="registry-desc">${animal.desc}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('registryModal').classList.add('active');
        };

        window.closeRegistry = function() {
            document.getElementById('registryModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        };

        function getAnimalIcon(type) {
            let iconHtml = '🐶'; 
            if (type === 'cat') iconHtml = '🐱';
            else if (type === 'monitor_lizard') iconHtml = '🦎';
            
            return L.divIcon({ html: iconHtml, className: 'animal-icon', iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -10] });
        }

        const animalNamesTh = { 'dog': 'น้องหมา', 'cat': 'น้องแมว', 'monitor_lizard': 'ตัวเงินตัวทอง' };

        function renderMapMarkers() {
            dogMarkersLayer.clearLayers(); 
            if (!globalAnimalsData) return;

            for (let key in globalAnimalsData) {
                const data = globalAnimalsData[key];
                const lat = data.lat; const lng = data.lng;
                const type = data.animalType || 'dog'; 
                const name = data.name || 'ไม่ทราบชื่อ'; const desc = data.description || '-';
                const count = data.count || 1; const imageUrl = data.imageUrl || '';
                
                const spotter = data.spotterName || 'ผู้ไม่ประสงค์ออกนาม';
                const spotterUid = data.spotterUid || 'unknown_uid';
                const timeString = new Date(data.timestamp).toLocaleTimeString('th-TH');
                const imageHtml = imageUrl ? `<img src="${imageUrl}" class="popup-img">` : '';

                let deleteBtnHtml = '';
                if (currentUser && currentUser.uid === spotterUid) {
                    deleteBtnHtml = `<button class="btn-delete" onclick="deleteAnimalMarker('${key}', '${spotterUid}')">🗑️ ลบพิกัดนี้</button>`;
                }

                const dynamicIcon = getAnimalIcon(type);
                const friendlyTypeName = animalNamesTh[type];

                const marker = L.marker([lat, lng], {icon: dynamicIcon})
                    .bindPopup(`
                        <b style="font-size:1.15em; color:#ffde59;">${friendlyTypeName} x${count} 🐾</b><br>
                        <b style="color:#e0e0e0;">แก๊งค์/ชื่อ:</b> ${name}<br>
                        <b style="color:#e0e0e0;">รายละเอียด:</b> ${desc}<br>
                        ${imageHtml}
                        <div style="color:#aaa; font-size:0.8em; margin-top:8px;">เจอโดย: <b style="color:white;">${spotter}</b><br>เวลา: ${timeString}</div>
                        ${deleteBtnHtml}
                    `);
                dogMarkersLayer.addLayer(marker);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user; 
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userPic').src = user.photoURL; 
                document.getElementById('userName').innerText = user.displayName; 
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
            renderMapMarkers();
        });

        document.getElementById('loginBtn').onclick = () => { signInWithPopup(auth, provider).catch((error) => { console.error("ล็อกอินไม่สำเร็จ:", error); }); };
        document.getElementById('logoutBtn').onclick = () => { signOut(auth); };

        const map = L.map('map', {zoomControl: false}).setView([14.0686, 100.6067], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '© OpenStreetMap contributors & © CARTO' }).addTo(map);

        const dogMarkersLayer = L.layerGroup().addTo(map);

        let userMarker = null;
        window.locateUser = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    map.setView([position.coords.latitude, position.coords.longitude], 17);
                    if (userMarker) userMarker.setLatLng([position.coords.latitude, position.coords.longitude]);
                    else userMarker = L.circleMarker([position.coords.latitude, position.coords.longitude], { radius: 10, fillColor: "#11135c", color: "#ffde59", weight: 3, opacity: 1, fillOpacity: 0.9 }).addTo(map).bindPopup("📍 คุณอยู่ที่นี่").openPopup();
                }, function() { alert("กรุณากดอนุญาตให้ GPS ของคุณก่อนครับ"); });
            }
        };

        window.deleteAnimalMarker = function(markerKey, ownerUid) {
            if (!currentUser) return alert("กรุณาล็อกอินก่อนลบพิกัดนะครับ! 🔑");
            if (currentUser.uid !== ownerUid) return alert("❌ คุณสามารถลบได้เฉพาะพิกัดที่คุณเป็นคนปักเท่านั้นครับ!");
            if(confirm("แน่ใจหรือไม่ว่าต้องการลบพิกัดนี้?")) {
                const markerRef = ref(db, 'tu_animals/' + markerKey);
                remove(markerRef).catch((error) => console.error(error));
            }
        };

        const animalsRef = ref(db, 'tu_animals'); 
        onValue(animalsRef, (snapshot) => { globalAnimalsData = snapshot.val(); renderMapMarkers(); });

        let tempLatLng = null;
        const modal = document.getElementById('inputModal');
        const overlay = document.getElementById('modalOverlay');

        map.on('click', function(e) {
            if (!currentUser) return alert("กรุณาล็อกอินด้วย Google ก่อนปักหมุดนะครับ 🐶🔑");
            tempLatLng = e.latlng;
            if(currentUser && currentUser.displayName) { document.getElementById('spotterNameInput').value = currentUser.displayName; }
            modal.classList.add('active'); overlay.classList.add('active');
        });

        function closeModal() {
            modal.classList.remove('active'); overlay.classList.remove('active');
            document.getElementById('animalType').selectedIndex = 0; 
            document.getElementById('dogName').selectedIndex = 0;
            document.getElementById('dogDesc').value = ''; 
            document.getElementById('dogCount').value = '1';
            document.getElementById('spotterNameInput').value = ''; 
            document.getElementById('dogImage').value = ''; 
            document.getElementById('saveBtn').innerText = "บันทึกพิกัด"; document.getElementById('saveBtn').disabled = false;
        }

        document.getElementById('cancelBtn').onclick = closeModal;

        document.getElementById('saveBtn').onclick = async function() {
            if (!tempLatLng || !currentUser) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "กำลังดำเนินการ..."; saveBtn.disabled = true;

            const selectedAnimalType = document.getElementById('animalType').value; 
            const selectedName = document.getElementById('dogName').value;
            const descInput = document.getElementById('dogDesc').value;
            const countInput = document.getElementById('dogCount').value;
            const file = document.getElementById('dogImage').files[0];
            
            let inputSpotterName = document.getElementById('spotterNameInput').value.trim();
            if (inputSpotterName === "") { inputSpotterName = "พลเมืองดี"; }

            let downloadUrl = "";

            try {
                if (file) {
                    const formData = new FormData(); formData.append("image", file);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const result = await response.json();
                    if (result.success) downloadUrl = result.data.url;
                }

                await push(animalsRef, {
                    lat: tempLatLng.lat, lng: tempLatLng.lng,
                    animalType: selectedAnimalType, name: selectedName, description: descInput || '-', 
                    count: countInput, imageUrl: downloadUrl, spotterName: inputSpotterName, 
                    spotterUid: currentUser.uid, timestamp: Date.now()
                });
                closeModal();
            } catch (error) {
                console.error(error); alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะครับ");
                saveBtn.innerText = "บันทึกพิกัด"; saveBtn.disabled = false;
            }
        };

        window.onload = function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.indexOf('Instagram') > -1 || ua.indexOf('Line') > -1) {
                var alertBox = document.createElement('div');
                alertBox.style.position = 'fixed'; alertBox.style.top = '0'; alertBox.style.left = '0'; alertBox.style.width = '100vw'; alertBox.style.height = '100vh'; alertBox.style.backgroundColor = 'rgba(17, 19, 92, 0.95)'; alertBox.style.color = 'white'; alertBox.style.zIndex = '9999'; alertBox.style.display = 'flex'; alertBox.style.flexDirection = 'column'; alertBox.style.justifyContent = 'center'; alertBox.style.alignItems = 'center'; alertBox.style.padding = '20px'; alertBox.style.textAlign = 'center'; alertBox.style.fontFamily = "'Kanit', sans-serif";
                alertBox.innerHTML = `
                    <h2 style="font-size: 2.5em; margin-bottom: 10px; color: #ffde59; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">🐾 ⚠️</h2>
                    <h3 style="margin-bottom: 20px; color: white;">กรุณาเปิดในเบราว์เซอร์หลัก</h3>
                    <p style="font-size: 1.1em; max-width: 300px; color: #e0e0e0;">เพื่อการใช้งานที่สมบูรณ์แบบและล็อกอินได้<br><br>กรุณากดไอคอน <b>จุด 3 จุด (...)</b> หรือ <b>เข็มทิศ</b> มุมหน้าจอ<br><br>แล้วเลือก <b>"เปิดในเบราว์เซอร์ (Open in Safari / Chrome)"</b></p>
                    <button onclick="this.parentElement.style.display='none'" style="margin-top: 30px; padding: 12px 25px; background: rgba(255,255,255,0.1); color: white; border: 1px solid white; border-radius: 16px; font-weight: bold; font-family: 'Kanit', sans-serif; font-size: 1.1em; transition: 0.3s;">เข้าใจแล้ว</button>
                `;
                document.body.appendChild(alertBox);
            }
        };
    </script>
</body>
</html>
