<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TU Animal Spotter - พิกัดน้องๆ ใน มธ.</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; font-family: 'Kanit', sans-serif; background-color: #f0f4f8; }
        #map { width: 100vw; height: 100vh; cursor: crosshair; }
        
        .leaflet-tile-pane { filter: saturate(1.2) contrast(1.05) hue-rotate(5deg); }

        .info-box {
            position: absolute; top: 15px; right: 15px; z-index: 1000;
            background: linear-gradient(135deg, #11135c 0%, #1e22aa 100%); color: white; 
            padding: 15px 20px; border-radius: 12px;
            box-shadow: 0 4px 15px rgba(17, 19, 92, 0.6); border: 2px solid #ffde59; width: 220px;
        }
        .info-box h3 { margin: 0 0 5px 0; font-size: 1.25em; text-align: center; color: #ffffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .instruction { font-size: 0.85em; text-align: center; margin-bottom: 10px; color: #ffde59; font-weight: bold; }
        
        .social-contact { margin-top: 15px; text-align: center; font-size: 0.85em; }
        .social-contact p { margin: 0 0 5px 0; color: #cccccc; font-size: 0.9em; }
        .social-link { display: inline-block; color: #ffde59; text-decoration: none; margin: 3px 0; font-weight: bold; background: rgba(255, 222, 89, 0.1); padding: 5px 10px; border-radius: 20px; width: 90%; transition: 0.2s; border: 1px solid rgba(255, 222, 89, 0.3); }
        .social-link:hover { background: #ffde59; color: #11135c; transform: scale(1.02); }

        .btn-google { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid #ffde59; padding: 10px 15px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; font-family: 'Kanit', sans-serif; transition: 0.2s; }
        .btn-google:hover { background: rgba(255, 222, 89, 0.2); transform: scale(1.02); }

        .animal-icon { font-size: 26px; text-align: center; line-height: 26px; drop-shadow: 0 2px 4px rgba(255,222,89,0.5); }

        .leaflet-popup-content-wrapper, .leaflet-popup-tip {
            background: linear-gradient(135deg, #11135c 0%, #1e22aa 100%); color: white; border: 1px solid #ffde59;
        }
        .leaflet-popup-close-button { color: #ffde59 !important; text-shadow: none; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(10, 15, 40, 0.85); z-index: 1999; backdrop-filter: blur(3px); }
        .modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: linear-gradient(135deg, #11135c 0%, #1e22aa 100%); color: white; 
            padding: 25px; border-radius: 16px; z-index: 2000; width: 85%; max-width: 320px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7); border: 2px solid #ffde59; 
            max-height: 85vh; overflow-y: auto; 
        }
        .modal.active, .modal-overlay.active { display: block; }
        .modal h4 { margin-top: 0; margin-bottom: 20px; text-align: center; color: #ffde59; font-size: 1.4em; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); font-weight: 800;}
        .modal label { color: white; font-weight: bold; font-size: 0.9em; display: block; margin-top: 10px; }
        
        .modal select, .modal input[type="text"], .modal input[type="number"] { 
            width: 100%; box-sizing: border-box; padding: 10px; margin: 5px 0 10px 0; 
            border: 1px solid rgba(255,255,255,0.5); border-radius: 8px; 
            background: rgba(0, 0, 0, 0.2); font-family: 'Kanit', sans-serif; color: white; font-size: 0.95em;
        }
        .modal select option { background: #11135c; color: white; } 
        .modal select:focus, .modal input[type="text"]:focus, .modal input[type="number"]:focus { 
            border-color: #ffde59; outline: none; background: rgba(0, 0, 0, 0.4); box-shadow: 0 0 8px rgba(255, 222, 89, 0.3);
        }
        .modal input[type="file"] { margin: 5px 0 20px 0; width: 100%; font-size: 0.9em; color: #cccccc; }
        
        .btn-group { display: flex; justify-content: space-between; gap: 10px; }
        .btn { padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; font-family: 'Kanit', sans-serif; font-size: 1em; }
        .btn-save { background: #ffde59; color: #11135c; border: none; }
        .btn-save:hover { background: #ffec8b; transform: scale(1.02); box-shadow: 0 0 10px rgba(255, 222, 89, 0.5); }
        .btn-cancel { background: transparent; color: white; border: 1px solid white; }
        .btn-cancel:hover { background: rgba(255, 255, 255, 0.1); }
        
        /* 🌟 ปุ่มและสไตล์สำหรับ "ทำเนียบสัตว์" 🌟 */
        .btn-registry { 
            position: absolute; bottom: 25px; left: 15px; z-index: 1000; 
            background: linear-gradient(135deg, #11135c 0%, #1e22aa 100%); 
            color: #ffde59; padding: 12px 18px; border: 2px solid #ffde59; border-radius: 30px; 
            box-shadow: 0 4px 10px rgba(17, 19, 92, 0.6); cursor: pointer; 
            font-family: 'Kanit', sans-serif; font-weight: bold; font-size: 1em; transition: 0.3s; 
        }
        .btn-registry:hover { transform: scale(1.05); background: #1e22aa; box-shadow: 0 4px 15px rgba(255, 222, 89, 0.4); }

        .registry-list { max-height: 50vh; overflow-y: auto; margin-bottom: 15px; padding-right: 5px; }
        .registry-card { display: flex; align-items: center; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; padding: 10px; margin-bottom: 10px; }
        .registry-card img { width: 65px; height: 65px; object-fit: cover; border-radius: 8px; border: 2px solid #ffde59; margin-right: 15px; flex-shrink: 0; }
        .registry-info { text-align: left; }
        .registry-name { color: #ffde59; font-weight: bold; font-size: 1.05em; margin: 0 0 3px 0; }
        .registry-desc { color: #cccccc; font-size: 0.8em; margin: 0; line-height: 1.4; }
        
        /* Custom Scrollbar สำหรับรายชื่อ */
        .registry-list::-webkit-scrollbar { width: 6px; }
        .registry-list::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
        .registry-list::-webkit-scrollbar-thumb { background: #ffde59; border-radius: 10px; }

        .btn-location { 
            position: absolute; bottom: 25px; right: 15px; z-index: 1000; 
            background: linear-gradient(135deg, #11135c 0%, #1e22aa 100%); 
            color: white; padding: 12px 18px; border: 2px solid #ffde59; border-radius: 30px; 
            box-shadow: 0 4px 10px rgba(17, 19, 92, 0.6); cursor: pointer; 
            font-family: 'Kanit', sans-serif; font-weight: bold; font-size: 1em; transition: 0.3s; 
        }
        .btn-location:hover { transform: scale(1.05); background: #1e22aa; box-shadow: 0 4px 15px rgba(255, 222, 89, 0.4); }

        @media only screen and (max-width: 600px) {
            .info-box { width: 180px; padding: 10px 15px; top: 10px; right: 10px; }
            .info-box h3 { font-size: 1.1em; }
            .instruction { font-size: 0.8em; }
            .modal { width: 90%; max-width: 300px; padding: 20px; }
            .btn-location { padding: 10px 15px; font-size: 0.9em; bottom: 20px; right: 10px; }
            .btn-registry { padding: 10px 15px; font-size: 0.9em; bottom: 20px; left: 10px; }
        }
    </style>
</head>
<body>

    <div class="info-box">
        <h3>🐾 พร้อมธรรม Spotter</h3>
        <p class="instruction">👇 แตะที่แผนที่เพื่อปักหมุด!</p>
        <hr style="border-color: #ffde59; margin: 15px 0;">
        
        <div id="auth-section">
            <button id="loginBtn" class="btn-google">🔑 ล็อกอินด้วย Google</button>
            <div id="userInfo" style="display: none; align-items: center; gap: 10px;">
                <img id="userPic" src="" alt="Profile" style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffde59;">
                <div>
                    <div id="userName" style="font-size: 0.9em; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 120px; color: white;"></div>
                    <button id="logoutBtn" style="background: transparent; border: none; color: #cccccc; cursor: pointer; padding: 0; font-size: 0.8em; text-decoration: underline; font-family: 'Kanit', sans-serif;">ออกจากระบบ</button>
                </div>
            </div>
        </div>

        <div class="social-contact">
            <hr style="border-color: rgba(255,222,89,0.3); margin: 15px 0 10px 0;">
            <p>ติดตามพรรคพร้อมธรรม</p>
            <a href="https://www.instagram.com/prompttu.party" target="_blank" class="social-link">📸 IG: @prompttu.party</a>
            <a href="https://www.tiktok.com/@prompttu.party" target="_blank" class="social-link">🎵 TikTok: @prompttu.party</a>
        </div>
    </div>

    <button class="btn-registry" onclick="openRegistry()">📖 ทำเนียบน้องๆ มธ.</button>
    <button class="btn-location" onclick="locateUser()">📍 ตำแหน่งของฉัน</button>
    <div id="map"></div>

    <div class="modal-overlay" id="modalOverlay"></div>
    
    <div class="modal" id="inputModal">
        <h4>ข้อมูลการเจอ</h4>

        <label>ชนิดของสัตว์:</label>
        <select id="animalType">
            <option value="dog">สุนัข 🐶</option>
            <option value="cat">แมว 🐱</option>
            <option value="monitor_lizard">ตัวเงินตัวทอง 🦎</option>
        </select>
        
        <label>ชื่อ/ลักษณะ (เลือกจากรายชื่อ หรือพิมพ์เพิ่ม):</label>
        <select id="dogName">
            <option value="ไม่ทราบชื่อ / ตัวใหม่">-- ไม่ทราบชื่อ / ตัวใหม่ --</option>
            <option value="เจ้าดำ ตึก SC">เจ้าดำ ตึก SC</option>
            <option value="น้อนด่าง อินเตอร์โซน">น้อนด่าง อินเตอร์โซน</option>
            <option value="หมาส้ม โรงอาหาร">หมาส้ม โรงอาหาร</option>
            <option value="เจ้าขาว หอสมุด">เจ้าขาว หอสมุด</option>
            <option value="แมวส้ม สถาปัตย์">แมวส้ม สถาปัตย์</option>
            <option value="แมวจร หน้าหอ">แมวจร หน้าหอ</option>
            <option value="ตะกวด ริมน้ำ บร.">ตะกวด ริมน้ำ บร.</option>
        </select>
        <label>ลักษณะเพิ่มเติม/รายละเอียดสถานที่:</label>
        <input type="text" id="dogDesc" placeholder="เช่น ใส่ปลอกคอ, นอนอยู่ใต้พุ่มไม้">
        
        <label>จำนวน (ตัว):</label>
        <input type="number" id="dogCount" value="1" min="1">
        
        <label>เจอโดย (นามแฝงของคุณ):</label>
        <input type="text" id="spotterNameInput" placeholder="เช่น เด็กหอ, พลเมืองดี">

        <label>รูปถ่าย (ถ้ามี):</label>
        <input type="file" id="dogImage" accept="image/*">
        
        <div class="btn-group">
            <button class="btn btn-cancel" id="cancelBtn">ยกเลิก</button>
            <button class="btn btn-save" id="saveBtn">บันทึกพิกัด</button>
        </div>
    </div>

    <div class="modal" id="registryModal">
        <h4>📖 ทำเนียบน้องๆ ขาใหญ่ มธ.</h4>
        <div id="registryList" class="registry-list"></div>
        <button class="btn btn-cancel" onclick="closeRegistry()" style="margin-top: 15px; width: 100%;">ปิด</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        // 🛑 🌟 ใส่ Config ของ Firebase ตรงนี้ 🌟 🛑
        const firebaseConfig = {
  apiKey: "6a5787ed71b7da00961d04d9a7a6ab21",
  authDomain: "tu-dog-spotter.firebaseapp.com",
  databaseURL: "https://tu-dog-spotter-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "tu-dog-spotter",
  storageBucket: "tu-dog-spotter.firebasestorage.app",
  messagingSenderId: "857595973549",
  appId: "1:857595973549:web:206633a42f2d487086db24"
        };

        const IMGBB_API_KEY = "6a5787ed71b7da00961d04d9a7a6ab21"; 

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        let currentUser = null;
        let globalAnimalsData = null;

        // 🌟 ข้อมูลจำลอง "ทำเนียบสัตว์" 🌟 (สามารถเปลี่ยนลิงก์รูปเป็นรูปจริงได้เลย)
        const animalRegistryData = [
            { icon: "🐶", name: "เจ้าดำ ตึก SC", desc: "สุนัขสีดำตัวใหญ่ ชอบนอนรับแอร์หน้าเซเว่นตึก SC เป็นมิตรแต่ออกแนวหยิ่งนิดๆ", img: "https://ibb.co/x8ShR8X3" },
            { icon: "🐶", name: "น้อนด่าง อินเตอร์โซน", desc: "สุนัขลายจุดขาวดำ ชอบวิ่งเล่นทักทายคนแถวอินเตอร์โซน", img: "https://placehold.co/150x150/11135c/ffde59?text=น้อนด่าง" },
            { icon: "🐶", name: "เจ้าขาว หอสมุด", desc: "สุนัขสีขาวล้วน ชอบนอนเงียบๆ ให้คนลูบหัวหน้าหอสมุดป๋วย", img: "https://placehold.co/150x150/11135c/ffde59?text=เจ้าขาว" },
            { icon: "🐱", name: "แมวส้ม สถาปัตย์", desc: "เจ้าถิ่นตึกสถาปัตย์ อ้วนกลม ร้องเก่ง ชอบนอนทับโปรเจกต์นักศึกษา", img: "https://placehold.co/150x150/11135c/ffde59?text=แมวส้ม" },
            { icon: "🦎", name: "ตะกวด ริมน้ำ บร.", desc: "ตัวเงินตัวทองไซส์บิ๊กเบิ้ม มักพบเห็นนอนอาบแดดอย่างสงบตามริมสระน้ำ", img: "https://placehold.co/150x150/11135c/ffde59?text=พี่เหี้ย" }
        ];

        // 🌟 ฟังก์ชันเปิดหน้าต่างทำเนียบสัตว์ 🌟
        window.openRegistry = function() {
            const listDiv = document.getElementById('registryList');
            listDiv.innerHTML = ""; // ล้างข้อมูลเก่าก่อน
            
            animalRegistryData.forEach(animal => {
                listDiv.innerHTML += `
                    <div class="registry-card">
                        <img src="${animal.img}" alt="${animal.name}">
                        <div class="registry-info">
                            <p class="registry-name">${animal.icon} ${animal.name}</p>
                            <p class="registry-desc">${animal.desc}</p>
                        </div>
                    </div>
                `;
            });

            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('registryModal').classList.add('active');
        };

        // 🌟 ฟังก์ชันปิดหน้าต่างทำเนียบสัตว์ 🌟
        window.closeRegistry = function() {
            document.getElementById('registryModal').classList.remove('active');
            document.getElementById('modalOverlay').classList.remove('active');
        };

        function getAnimalIcon(type) {
            let iconHtml = '🐶'; 
            if (type === 'cat') iconHtml = '🐱';
            else if (type === 'monitor_lizard') iconHtml = '🦎';
            
            return L.divIcon({ html: iconHtml, className: 'animal-icon', iconSize: [30, 30], iconAnchor: [15, 15], popupAnchor: [0, -10] });
        }

        const animalNamesTh = { 'dog': 'น้องหมา', 'cat': 'น้องแมว', 'monitor_lizard': 'ตัวเงินตัวทอง/ตะกวด' };

        function renderMapMarkers() {
            dogMarkersLayer.clearLayers(); 
            if (!globalAnimalsData) return;

            for (let key in globalAnimalsData) {
                const data = globalAnimalsData[key];
                const lat = data.lat; const lng = data.lng;
                const type = data.animalType || 'dog'; 
                const name = data.name || 'ไม่ทราบชื่อ'; const desc = data.description || '-';
                const count = data.count || 1; const imageUrl = data.imageUrl || '';
                
                const spotter = data.spotterName || 'ผู้ไม่ประสงค์ออกนาม';
                const spotterUid = data.spotterUid || 'unknown_uid';
                const timeString = new Date(data.timestamp).toLocaleTimeString('th-TH');
                const imageHtml = imageUrl ? `<img src="${imageUrl}" class="popup-img">` : '';

                let deleteBtnHtml = '';
                if (currentUser && currentUser.uid === spotterUid) {
                    deleteBtnHtml = `<button class="btn-delete" onclick="deleteAnimalMarker('${key}', '${spotterUid}')">🗑️ ลบพิกัดนี้</button>`;
                }

                const dynamicIcon = getAnimalIcon(type);
                const friendlyTypeName = animalNamesTh[type];

                const marker = L.marker([lat, lng], {icon: dynamicIcon})
                    .bindPopup(`
                        <b style="font-size:1.1em; color:#ffde59;">${friendlyTypeName} ${count} ตัว 🐾</b><br>
                        <b style="color:#cccccc;">ชื่อ/ลักษณะ:</b> ${name}<br>
                        <b style="color:#cccccc;">ลักษณะเพิ่มเติม:</b> ${desc}<br>
                        ${imageHtml}
                        <div style="color:#aaaaaa; font-size:0.8em; margin-top:5px;">เจอโดย: <b style="color:#ffde59;">${spotter}</b><br>อัปเดตเมื่อ: ${timeString}</div>
                        ${deleteBtnHtml}
                    `);
                dogMarkersLayer.addLayer(marker);
            }
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user; 
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('userPic').src = user.photoURL; 
                document.getElementById('userName').innerText = user.displayName; 
            } else {
                currentUser = null;
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
            }
            renderMapMarkers();
        });

        document.getElementById('loginBtn').onclick = () => { signInWithPopup(auth, provider).catch((error) => { console.error("ล็อกอินไม่สำเร็จ:", error); }); };
        document.getElementById('logoutBtn').onclick = () => { signOut(auth); };

        const map = L.map('map').setView([14.0686, 100.6067], 16);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { maxZoom: 19, attribution: '© OpenStreetMap contributors & © CARTO' }).addTo(map);

        const dogMarkersLayer = L.layerGroup().addTo(map);

        let userMarker = null;
        window.locateUser = function() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    map.setView([position.coords.latitude, position.coords.longitude], 17);
                    if (userMarker) userMarker.setLatLng([position.coords.latitude, position.coords.longitude]);
                    else userMarker = L.circleMarker([position.coords.latitude, position.coords.longitude], { radius: 9, fillColor: "#11135c", color: "#ffde59", weight: 2, opacity: 1, fillOpacity: 0.9 }).addTo(map).bindPopup("📍 คุณอยู่ที่นี่").openPopup();
                }, function() { alert("กรุณากดอนุญาตให้ GPS ของคุณก่อนนะครับ"); });
            }
        };

        window.deleteAnimalMarker = function(markerKey, ownerUid) {
            if (!currentUser) return alert("กรุณาล็อกอินก่อนลบพิกัดนะครับ! 🔑");
            if (currentUser.uid !== ownerUid) return alert("❌ คุณสามารถลบได้เฉพาะพิกัดที่คุณเป็นคนปักเท่านั้นครับ!");
            if(confirm("แน่ใจหรือไม่ว่าต้องการลบพิกัดนี้?")) {
                const markerRef = ref(db, 'tu_animals/' + markerKey);
                remove(markerRef).catch((error) => console.error(error));
            }
        };

        const animalsRef = ref(db, 'tu_animals'); 
        onValue(animalsRef, (snapshot) => { globalAnimalsData = snapshot.val(); renderMapMarkers(); });

        let tempLatLng = null;
        const modal = document.getElementById('inputModal');
        const overlay = document.getElementById('modalOverlay');

        map.on('click', function(e) {
            if (!currentUser) return alert("กรุณาล็อกอินด้วย Google ก่อนปักหมุดนะครับ 🐶🔑");
            tempLatLng = e.latlng;
            if(currentUser && currentUser.displayName) { document.getElementById('spotterNameInput').value = currentUser.displayName; }
            modal.classList.add('active'); overlay.classList.add('active');
        });

        function closeModal() {
            modal.classList.remove('active'); overlay.classList.remove('active');
            document.getElementById('animalType').selectedIndex = 0; 
            document.getElementById('dogName').selectedIndex = 0;
            document.getElementById('dogDesc').value = ''; 
            document.getElementById('dogCount').value = '1';
            document.getElementById('spotterNameInput').value = ''; 
            document.getElementById('dogImage').value = ''; 
            document.getElementById('saveBtn').innerText = "บันทึกพิกัด"; document.getElementById('saveBtn').disabled = false;
        }

        document.getElementById('cancelBtn').onclick = closeModal;

        document.getElementById('saveBtn').onclick = async function() {
            if (!tempLatLng || !currentUser) return;
            const saveBtn = document.getElementById('saveBtn');
            saveBtn.innerText = "กำลังดำเนินการ..."; saveBtn.disabled = true;

            const selectedAnimalType = document.getElementById('animalType').value; 
            const selectedName = document.getElementById('dogName').value;
            const descInput = document.getElementById('dogDesc').value;
            const countInput = document.getElementById('dogCount').value;
            const file = document.getElementById('dogImage').files[0];
            
            let inputSpotterName = document.getElementById('spotterNameInput').value.trim();
            if (inputSpotterName === "") { inputSpotterName = "พลเมืองดี"; }

            let downloadUrl = "";

            try {
                if (file) {
                    const formData = new FormData(); formData.append("image", file);
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const result = await response.json();
                    if (result.success) downloadUrl = result.data.url;
                }

                await push(animalsRef, {
                    lat: tempLatLng.lat, lng: tempLatLng.lng,
                    animalType: selectedAnimalType, name: selectedName, description: descInput || '-', 
                    count: countInput, imageUrl: downloadUrl, spotterName: inputSpotterName, 
                    spotterUid: currentUser.uid, timestamp: Date.now()
                });
                closeModal();
            } catch (error) {
                console.error(error); alert("เกิดข้อผิดพลาด ลองใหม่อีกครั้งนะครับ");
                saveBtn.innerText = "บันทึกพิกัด"; saveBtn.disabled = false;
            }
        };

        window.onload = function() {
            var ua = navigator.userAgent || navigator.vendor || window.opera;
            if (ua.indexOf('Instagram') > -1 || ua.indexOf('Line') > -1) {
                var alertBox = document.createElement('div');
                alertBox.style.position = 'fixed'; alertBox.style.top = '0'; alertBox.style.left = '0'; alertBox.style.width = '100vw'; alertBox.style.height = '100vh'; alertBox.style.backgroundColor = 'rgba(17, 19, 92, 0.95)'; alertBox.style.color = 'white'; alertBox.style.zIndex = '9999'; alertBox.style.display = 'flex'; alertBox.style.flexDirection = 'column'; alertBox.style.justifyContent = 'center'; alertBox.style.alignItems = 'center'; alertBox.style.padding = '20px'; alertBox.style.textAlign = 'center'; alertBox.style.fontFamily = "'Kanit', sans-serif";
                alertBox.innerHTML = `
                    <h2 style="font-size: 2.5em; margin-bottom: 10px; color: #ffde59; text-shadow: 2px 2px 5px rgba(0,0,0,0.5);">🐾 ⚠️</h2>
                    <h3 style="margin-bottom: 20px; color: #FFFFFF;">กรุณาเปิดในเบราว์เซอร์หลัก</h3>
                    <p style="font-size: 1.1em; max-width: 300px; color: #cccccc;">เพื่อการใช้งานที่สมบูรณ์แบบและล็อกอินได้<br><br>กรุณากดไอคอน <b>จุด 3 จุด (...)</b> หรือ <b>เข็มทิศ</b> มุมหน้าจอ<br><br>แล้วเลือก <b>"เปิดในเบราว์เซอร์ (Open in Safari / Chrome)"</b></p>
                    <button onclick="this.parentElement.style.display='none'" style="margin-top: 30px; padding: 12px 25px; background: #ffde59; color: #11135c; border: none; border-radius: 12px; font-weight: bold; font-family: 'Kanit', sans-serif; font-size: 1.1em; box-shadow: 0 4px 10px rgba(0,0,0,0.3);">เข้าใจแล้ว</button>
                `;
                document.body.appendChild(alertBox);
            }
        };
    </script>
</body>
</html>
